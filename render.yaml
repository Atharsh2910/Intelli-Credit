services:
  - type: web
    name: intelli-credit
    env: python
    plan: free

    buildCommand: pip install uv && uv pip install -r requirements.txt --system
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ORIGINS
